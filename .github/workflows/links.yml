name: Check Links

on:
  schedule:
    - cron: "0 0 * * 1"
  workflow_dispatch:
  push:
    paths:
      - README.md

jobs:
  link-checker:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Check links
        uses: lycheeverse/lychee-action@v1
        with:
          args: --timeout 30 README.md
          fail: false
      - name: Upload report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: lychee-report
          path: lychee/out.md
